<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Алхимия Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1e1e2f;
            --text: #ffffff;
            --primary: #ffeb3b;
            --card-bg: #2a2a40;
            --card-active: #4caf50;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            user-select: none;
            overflow-x: hidden;
        }
        * { box-sizing: border-box; }

        /* Анимация тряски при ошибке */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        /* Шапка с прогрессом */
        .header {
            text-align: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .progress-text { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        .win-message { color: #4caf50; font-size: 16px; font-weight: bold; display: none; margin-top: 10px; }

        /* Сетка элементов */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            padding-bottom: 40px;
        }
        .element-card {
            background-color: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .element-card.selected {
            border-color: var(--primary);
            background-color: rgba(255, 235, 59, 0.1);
            transform: scale(1.05);
        }
        .element-card.new {
            animation: pulse-green 1s ease-out;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        .emoji { font-size: 32px; margin-bottom: 5px; }
        .name { font-size: 12px; font-weight: bold; }

        .reset-btn {
            display: block; width: 100%; padding: 12px; margin-top: 20px;
            background: #ff5252; color: white; border: none; border-radius: 10px;
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body id="app-body">

    <div class="header">
        <div id="player-name" style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Алхимик</div>
        <div class="progress-text" id="progress-display">Собрано: 4 / 26</div>
        <div class="win-message" id="win-message">🎉 Вы открыли все элементы! Вы истинный Магистр Алхимии! 🎉</div>
    </div>

    <div class="grid" id="elements-grid">
        </div>

    <button class="reset-btn" onclick="resetGame()">Начать заново</button>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('player-name').innerText = `Алхимик: ${tg.initDataUnsafe?.user?.first_name || 'Гость'}`;

        // === БАЗА ДАННЫХ ЭЛЕМЕНТОВ ===
        const ELEMENTS = {
            // База (4)
            'fire': { name: 'Огонь', emoji: '🔥' },
            'water': { name: 'Вода', emoji: '💧' },
            'earth': { name: 'Земля', emoji: '🌍' },
            'air': { name: 'Воздух', emoji: '💨' },
            // Уровень 1 (6)
            'steam': { name: 'Пар', emoji: '☁️' },
            'lava': { name: 'Лава', emoji: '🌋' },
            'mud': { name: 'Грязь', emoji: '💩' },
            'dust': { name: 'Пыль', emoji: '🌪️' },
            'rain': { name: 'Дождь', emoji: '🌧️' },
            'energy': { name: 'Энергия', emoji: '⚡' },
            // Уровень 2 (8)
            'life': { name: 'Жизнь', emoji: '🌱' },
            'stone': { name: 'Камень', emoji: '🪨' },
            'plant': { name: 'Растение', emoji: '🌿' },
            'ash': { name: 'Пепел', emoji: '🌑' },
            'lightning': { name: 'Молния', emoji: '🌩️' },
            'sea': { name: 'Море', emoji: '🌊' },
            'mountain': { name: 'Гора', emoji: '⛰️' },
            'cloud': { name: 'Облако', emoji: '⛅' },
            // Уровень 3 (8)
            'animal': { name: 'Животное', emoji: '🐾' },
            'bird': { name: 'Птица', emoji: '🕊️' },
            'metal': { name: 'Металл', emoji: '⚙️' },
            'robot': { name: 'Робот', emoji: '🤖' },
            'storm': { name: 'Шторм', emoji: '⛈️' },
            'forest': { name: 'Лес', emoji: '🌲' },
            'human': { name: 'Человек', emoji: '🧍' },
            'tool': { name: 'Инструмент', emoji: '🛠️' }
        };

        const TOTAL_ELEMENTS = Object.keys(ELEMENTS).length;

        // === РЕЦЕПТЫ ===
        // ВАЖНО: Ключи всегда должны быть отсортированы по алфавиту! (air перед earth и т.д.)
        const RECIPES = {
            // Уровень 1
            'fire+water': 'steam',
            'earth+fire': 'lava',
            'earth+water': 'mud',
            'air+earth': 'dust',
            'air+water': 'rain',
            'air+fire': 'energy',
            // Уровень 2
            'energy+mud': 'life',
            'lava+water': 'stone',
            'earth+rain': 'plant',
            'dust+fire': 'ash',
            'air+energy': 'lightning',
            'water+water': 'sea',
            'earth+earth': 'mountain',
            'air+steam': 'cloud',
            // Уровень 3
            'earth+life': 'animal',
            'air+life': 'bird',
            'fire+stone': 'metal',
            'energy+metal': 'robot',
            'cloud+lightning': 'storm',
            'plant+plant': 'forest',
            'animal+fire': 'human',
            'human+metal': 'tool'
        };

        // === СОСТОЯНИЕ ИГРЫ ===
        let unlocked = JSON.parse(localStorage.getItem('alchemy_unlocked')) || ['fire', 'water', 'earth', 'air'];
        let selectedId = null; // ID первого выбранного элемента

        // === ОСНОВНАЯ ЛОГИКА ===
        function render() {
            const grid = document.getElementById('elements-grid');
            grid.innerHTML = ''; // Очищаем сетку

            unlocked.forEach(id => {
                const el = ELEMENTS[id];
                const card = document.createElement('div');
                card.className = `element-card ${selectedId === id ? 'selected' : ''}`;
                card.onclick = () => handleSelect(id);
                
                card.innerHTML = `
                    <div class="emoji">${el.emoji}</div>
                    <div class="name">${el.name}</div>
                `;
                grid.appendChild(card);
            });

            // Обновляем прогресс
            document.getElementById('progress-display').innerText = `Собрано: ${unlocked.length} / ${TOTAL_ELEMENTS}`;
            
            // Проверка победы
            if (unlocked.length >= TOTAL_ELEMENTS) {
                document.getElementById('win-message').style.display = 'block';
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function handleSelect(id) {
            // Если ничего не выбрано — выбираем первый элемент
            if (!selectedId) {
                selectedId = id;
                if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                render();
                return;
            }

            // Если кликнули на тот же самый — отменяем выбор
            if (selectedId === id) {
                selectedId = null;
                render();
                return;
            }

            // Попытка скрестить два элемента
            combine(selectedId, id);
        }

        function combine(id1, id2) {
            // 1. Сортируем ID по алфавиту, чтобы 'fire+water' было равно 'water+fire'
            const recipeKey = [id1, id2].sort().join('+');
            const resultId = RECIPES[recipeKey];

            if (resultId) {
                // УСПЕХ: Рецепт существует
                if (!unlocked.includes(resultId)) {
                    // Это новый элемент!
                    unlocked.push(resultId);
                    localStorage.setItem('alchemy_unlocked', JSON.stringify(unlocked));
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    // Элемент уже открыт (просто легкая вибрация)
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }
            } else {
                // ОШИБКА: Рецепта нет
                triggerShake();
            }

            // В любом случае сбрасываем выбор
            selectedId = null;
            render();
        }

        function triggerShake() {
            const body = document.getElementById('app-body');
            body.classList.remove('shake');
            void body.offsetWidth; // Магия браузера для перезапуска анимации
            body.classList.add('shake');
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        function resetGame() {
            if (confirm('Точно хочешь стереть все открытые элементы?')) {
                unlocked = ['fire', 'water', 'earth', 'air'];
                selectedId = null;
                localStorage.setItem('alchemy_unlocked', JSON.stringify(unlocked));
                document.getElementById('win-message').style.display = 'none';
                render();
            }
        }

        // Запуск
        render();
    </script>
</body>
</html>
