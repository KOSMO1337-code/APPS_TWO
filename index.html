<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geometry Dash — Double Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0f1e;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }
        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0f1725 0%, #020617 100%);
        }
        canvas {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 85%;
            border-radius: 20px;
            box-shadow: 0 0 0 3px #0ff, 0 0 0 8px #1e293b, 0 20px 40px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding: 10px 24px;
            background: #0a1020cc;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            color: #0ff;
            font-weight: bold;
            width: 90%;
            max-width: 850px;
            border: 1px solid cyan;
        }
        .score-box, .coins-box, .double-box {
            font-size: 26px;
            background: #010a1a;
            padding: 4px 20px;
            border-radius: 40px;
            border: 1px solid cyan;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .double-box {
            font-size: 22px;
            background: #2a1a2a;
            border-color: #ffaa44;
        }
        .restart-btn {
            background: #1f2a3e;
            border: none;
            color: #0ff;
            font-weight: bold;
            font-family: monospace;
            font-size: 20px;
            padding: 6px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 4px 0 #0f172a;
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f172a;
        }
        .status {
            font-size: 20px;
            background: #000000aa;
            padding: 4px 20px;
            border-radius: 30px;
            letter-spacing: 1px;
        }
        @media (max-width: 700px) {
            .score-box, .coins-box, .double-box { font-size: 16px; padding: 2px 12px; }
            .status { font-size: 14px; }
            .restart-btn { font-size: 16px; padding: 4px 18px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="1800" height="900" style="width:100%; height:auto; max-width:1200px; aspect-ratio:1200/600"></canvas>
    <div class="info-panel">
        <div class="score-box">🏆 <span id="scoreValue">0</span></div>
        <div class="coins-box">🪙 <span id="coinsValue">0</span></div>
        <div class="double-box">✨ <span id="doubleValue">1</span></div>
        <div class="status" id="gameStatusText">🏃‍♂️ RUNNING</div>
        <button class="restart-btn" id="restartButton">⟳ RESTART</button>
    </div>
    <div style="text-align:center; margin-top: 10px; color:#9ca3af; font-size:13px; background:#00000066; padding:4px 12px; border-radius:30px;">
        🎮 ПРОБЕЛ / КЛИК / ТАП — ПРЫЖОК (2 ПРЫЖКА В ВОЗДУХЕ!) &nbsp;|&nbsp; ✨ Монеты &nbsp;|&nbsp; ⚡ Шипы
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    (function () {
        // ---------- TELEGRAM FULLSCREEN ----------
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        setTimeout(() => {
            if (tg.requestFullscreen) tg.requestFullscreen().catch(e => console.log);
        }, 100);
        window.addEventListener('resize', () => tg.expand());

        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_W = 1600;
        const CANVAS_H = 800;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        // ---------- ИГРОВЫЕ КОНСТАНТЫ ----------
        const GRAVITY = 0.75;
        const JUMP_POWER = -11.5;
        const GROUND_Y = CANVAS_H - 80;
        const PLAYER_W = 40;
        const PLAYER_H = 40;
        const PLAYER_X = 220;

        let worldSpeed = 6.5;
        let baseSpeed = 6.0;
        let score = 0;
        let coins = 0;
        let gameOver = false;
        let frame = 0;

        // Игрок
        let player = {
            x: PLAYER_X,
            y: GROUND_Y - PLAYER_H,
            vy: 0,
            grounded: true,
            color: "#FFBB44",
            trail: [],
            doubleJumpsLeft: 1      // <--- Двойной прыжок: 1 доступен в воздухе
        };

        // Препятствия и монеты
        let obstacles = [];
        let coinsList = [];

        // Эффекты частиц
        let particles = [];

        // Параллакс-фон
        let bgOffset = 0;

        // Визуальные эффекты
        let deathFlash = 0;
        let screenShake = 0;
        let trailCounter = 0;

        // Звуки (Web Audio)
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playJumpSound() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.15;
            osc.type = 'sine';
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
        function playDoubleJumpSound() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 1318.52; // выше
            gain.gain.value = 0.12;
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
        function playCoinSound() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 1046.50;
            gain.gain.value = 0.1;
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
        function playDeathSound() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 220;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Частицы
        function addParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + Math.random() * PLAYER_W,
                    y: y + Math.random() * PLAYER_H,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 2,
                    life: 0.8,
                    color: color,
                    size: 3 + Math.random() * 4
                });
            }
        }

        // Генерация препятствий
        function generateObstacle() {
            const type = Math.floor(Math.random() * 3);
            let w = 28, h = 32;
            let y = GROUND_Y - h + 6;
            if (type === 1) {
                h = 52;
                y = GROUND_Y - h + 8;
                w = 24;
            }
            return {
                x: CANVAS_W + 30 + Math.random() * 80,
                w: w,
                h: h,
                y: y,
                type: type,
                swing: type === 2 ? 0 : 0
            };
        }

        // Генерация монеты
        function generateCoin() {
            return {
                x: CANVAS_W + 100 + Math.random() * 300,
                y: GROUND_Y - 45 - Math.random() * 70,
                w: 14,
                h: 14,
                collected: false,
                floatOffset: Math.random() * Math.PI * 2
            };
        }

        function restartGame() {
            gameOver = false;
            deathFlash = 0;
            screenShake = 0;
            score = 0;
            coins = 0;
            worldSpeed = baseSpeed;
            obstacles = [];
            coinsList = [];
            particles = [];
            player.y = GROUND_Y - PLAYER_H;
            player.vy = 0;
            player.grounded = true;
            player.doubleJumpsLeft = 1;   // сброс двойного прыжка
            updateDoubleUI();
            // начальные препятствия
            for (let i = 0; i < 4; i++) {
                let obs = generateObstacle();
                obs.x = CANVAS_W + 200 + i * 380;
                obstacles.push(obs);
            }
            // начальные монеты
            for (let i = 0; i < 6; i++) {
                let coin = generateCoin();
                coin.x = CANVAS_W + 150 + i * 280;
                coinsList.push(coin);
            }
            document.getElementById('scoreValue').innerText = "0";
            document.getElementById('coinsValue').innerText = "0";
            document.getElementById('gameStatusText').innerHTML = "🏃‍♂️ RUNNING";
            document.getElementById('gameStatusText').style.color = "#0ff";
        }

        function updateDoubleUI() {
            document.getElementById('doubleValue').innerText = player.doubleJumpsLeft;
        }

        function updateGame() {
            if (gameOver) return;

            // Физика
            player.vy += GRAVITY;
            player.y += player.vy;
            let wasGrounded = player.grounded;
            if (player.y + PLAYER_H >= GROUND_Y) {
                player.y = GROUND_Y - PLAYER_H;
                player.vy = 0;
                player.grounded = true;
                // При касании земли сбрасываем двойной прыжок
                if (!wasGrounded) {
                    player.doubleJumpsLeft = 1;
                    updateDoubleUI();
                }
            } else {
                player.grounded = false;
            }
            if (player.y < 0) {
                player.y = 0;
                if (player.vy < 0) player.vy = 0;
            }

            // Движение объектов
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= worldSpeed;
                if (obstacles[i].type === 2) {
                    obstacles[i].swing += 0.1;
                }
            }
            for (let i = 0; i < coinsList.length; i++) {
                coinsList[i].x -= worldSpeed;
                coinsList[i].floatOffset += 0.05;
            }
            obstacles = obstacles.filter(o => o.x + o.w > 0);
            coinsList = coinsList.filter(c => c.x + c.w > 0 && !c.collected);

            // Генерация новых объектов
            if (obstacles.length === 0 || obstacles[obstacles.length-1].x < CANVAS_W + 350) {
                let newObs = generateObstacle();
                newObs.x = CANVAS_W + 400 + Math.random() * 200;
                obstacles.push(newObs);
            }
            if (coinsList.length < 4 && Math.random() < 0.02) {
                let newCoin = generateCoin();
                newCoin.x = CANVAS_W + 200 + Math.random() * 300;
                coinsList.push(newCoin);
            }

            // Столкновения с препятствиями
            const playerRect = { x: player.x, y: player.y, w: PLAYER_W, h: PLAYER_H };
            for (let obs of obstacles) {
                const obsRect = { x: obs.x, y: obs.y, w: obs.w, h: obs.h };
                if (playerRect.x < obsRect.x + obsRect.w &&
                    playerRect.x + playerRect.w > obsRect.x &&
                    playerRect.y < obsRect.y + obsRect.h &&
                    playerRect.y + playerRect.h > obsRect.y) {
                    gameOver = true;
                    deathFlash = 1;
                    screenShake = 12;
                    addParticles(player.x, player.y, "#ff6666", 20);
                    playDeathSound();
                    document.getElementById('gameStatusText').innerHTML = "💀 GAME OVER 💀";
                    document.getElementById('gameStatusText').style.color = "#ff8888";
                    break;
                }
            }

            // Сбор монет
            for (let i = 0; i < coinsList.length; i++) {
                let c = coinsList[i];
                if (!c.collected &&
                    playerRect.x < c.x + c.w && playerRect.x + PLAYER_W > c.x &&
                    playerRect.y < c.y + c.h && playerRect.y + PLAYER_H > c.y) {
                    c.collected = true;
                    coins++;
                    score += 50;
                    playCoinSound();
                    addParticles(c.x + c.w/2, c.y + c.h/2, "#FFD966", 6);
                    document.getElementById('coinsValue').innerText = coins;
                    updateScoreUI();
                }
            }

            // Очки за дистанцию
            if (!gameOver) {
                score += 0.4 + worldSpeed * 0.04;
                updateScoreUI();
                if (worldSpeed < 12) {
                    worldSpeed = baseSpeed + score / 1400;
                    if (worldSpeed > 12) worldSpeed = 12;
                }
            }

            // trail игрока
            if (frame % 3 === 0 && player.grounded) {
                player.trail.unshift({ x: player.x, y: player.y + PLAYER_H - 5, life: 0.6 });
                if (player.trail.length > 8) player.trail.pop();
            }
            for (let t of player.trail) t.life -= 0.03;
            player.trail = player.trail.filter(t => t.life > 0);
        }

        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }

        // ------ ОТРИСОВКА ------
        function drawParallaxBackground() {
            bgOffset = (bgOffset + 0.5) % CANVAS_W;
            const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            grad.addColorStop(0, "#0b1120");
            grad.addColorStop(0.5, "#1a2a4a");
            grad.addColorStop(1, "#0f1725");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = "#ffffff20";
            for (let i = 0; i < 12; i++) {
                let x = (bgOffset * 0.3 + i * 180) % CANVAS_W;
                ctx.beginPath();
                ctx.ellipse(x, 70 + i * 40, 40, 25, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            for (let i = 0; i < 200; i++) {
                if (i % 3 === 0) continue;
                let sx = (i * 97) % CANVAS_W;
                let sy = (i * 131) % (CANVAS_H - 100);
                ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.002 + i) * 0.2;
                ctx.fillStyle = "#fff";
                ctx.fillRect(sx, sy, 1.5, 1.5);
            }
            ctx.globalAlpha = 1;
        }

        function drawGroundDetail() {
            ctx.fillStyle = "#2c1a10";
            ctx.fillRect(0, GROUND_Y - 12, CANVAS_W, 20);
            ctx.fillStyle = "#5a3a2a";
            ctx.fillRect(0, GROUND_Y - 6, CANVAS_W, 8);
            ctx.fillStyle = "#e0a878";
            ctx.fillRect(0, GROUND_Y - 2, CANVAS_W, 4);
            for (let i = 0; i < 30; i++) {
                let x = (frame * 2 + i * 55) % CANVAS_W;
                ctx.fillStyle = "#c97e3a";
                ctx.fillRect(x, GROUND_Y - 10, 14, 5);
                ctx.fillStyle = "#e5a050";
                ctx.fillRect(x + 3, GROUND_Y - 12, 8, 3);
            }
            ctx.fillStyle = "#ffefb0";
            for (let i = 0; i < 15; i++) {
                ctx.fillRect((frame * 1.5 + i * 87) % CANVAS_W, GROUND_Y - 4, 4, 2);
            }
        }

        function drawPlayerWithTrail() {
            for (let t of player.trail) {
                ctx.globalAlpha = t.life * 0.6;
                ctx.fillStyle = "#FFAA55";
                ctx.fillRect(t.x, t.y, PLAYER_W, 6);
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 16;
            ctx.shadowColor = "#ffbb55";
            const grad = ctx.createLinearGradient(player.x, player.y, player.x + PLAYER_W, player.y + PLAYER_H);
            grad.addColorStop(0, player.grounded ? "#FFCC66" : "#FFAA44");
            grad.addColorStop(1, "#EE9922");
            ctx.fillStyle = grad;
            ctx.fillRect(player.x, player.y, PLAYER_W, PLAYER_H);
            ctx.fillStyle = "#000";
            ctx.fillRect(player.x + 8, player.y + 10, 6, 6);
            ctx.fillRect(player.x + 22, player.y + 10, 6, 6);
            ctx.fillStyle = "white";
            ctx.fillRect(player.x + 9, player.y + 11, 3, 3);
            ctx.fillRect(player.x + 23, player.y + 11, 3, 3);
            ctx.beginPath();
            ctx.strokeStyle = "#442200";
            ctx.lineWidth = 2;
            if (player.grounded) {
                ctx.arc(player.x + 18, player.y + 24, 10, 0.1, Math.PI - 0.1);
            } else {
                ctx.arc(player.x + 18, player.y + 22, 9, 0.05, Math.PI - 0.05);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawObstaclesDetailed() {
            for (let obs of obstacles) {
                if (obs.type === 0) {
                    ctx.fillStyle = "#E63946";
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.h);
                    ctx.lineTo(obs.x + obs.w/2, obs.y);
                    ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                    ctx.fill();
                    ctx.fillStyle = "#B91C1C";
                    ctx.beginPath();
                    ctx.moveTo(obs.x + 5, obs.y + obs.h - 5);
                    ctx.lineTo(obs.x + obs.w/2, obs.y + 8);
                    ctx.lineTo(obs.x + obs.w - 5, obs.y + obs.h - 5);
                    ctx.fill();
                } else if (obs.type === 1) {
                    ctx.fillStyle = "#6B5B4B";
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = "#4A3A2A";
                    ctx.fillRect(obs.x + 4, obs.y, obs.w-8, obs.h/2);
                    ctx.fillStyle = "#A57C5C";
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(obs.x + 5 + i*6, obs.y + obs.h-12, 4, 8);
                    }
                } else if (obs.type === 2) {
                    let swingY = Math.sin(obs.swing) * 3;
                    ctx.fillStyle = "#FF6347";
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.h + swingY);
                    ctx.lineTo(obs.x + obs.w/2, obs.y - 5 + swingY);
                    ctx.lineTo(obs.x + obs.w, obs.y + obs.h + swingY);
                    ctx.fill();
                    ctx.fillStyle = "#CC3300";
                    ctx.beginPath();
                    ctx.moveTo(obs.x + 4, obs.y + obs.h - 3 + swingY);
                    ctx.lineTo(obs.x + obs.w/2, obs.y + 3 + swingY);
                    ctx.lineTo(obs.x + obs.w - 4, obs.y + obs.h - 3 + swingY);
                    ctx.fill();
                }
            }
        }

        function drawCoins() {
            for (let coin of coinsList) {
                if (coin.collected) continue;
                let floatY = Math.sin(coin.floatOffset) * 4;
                ctx.fillStyle = "#FFD700";
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#FFAA00";
                ctx.beginPath();
                ctx.ellipse(coin.x + coin.w/2, coin.y + coin.h/2 + floatY, coin.w/2, coin.h/2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#FFA500";
                ctx.beginPath();
                ctx.ellipse(coin.x + coin.w/2, coin.y + coin.h/2 + floatY, coin.w/3, coin.h/3, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillRect(coin.x + coin.w/2 - 2, coin.y + coin.h/2 - 2 + floatY, 4, 4);
                ctx.shadowBlur = 0;
            }
        }

        function drawParticles() {
            for (let i=0; i<particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.vy += 0.2;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;
        }

        function drawUIEffects() {
            let speedPercent = (worldSpeed - baseSpeed) / (12 - baseSpeed);
            ctx.fillStyle = "#0ff";
            ctx.fillRect(0, GROUND_Y - 28, CANVAS_W * speedPercent, 6);
            ctx.fillStyle = "#ffffff30";
            ctx.fillRect(0, GROUND_Y - 28, CANVAS_W, 1);
            ctx.font = "bold 24monospace";
            ctx.fillStyle = "#FFE484";
            ctx.fillText("x" + coins, CANVAS_W - 80, 60);
            ctx.font = "20monospace";
            ctx.fillStyle = "#88ccff";
            ctx.fillText("⚡ " + worldSpeed.toFixed(1), CANVAS_W - 120, 110);
            // индикатор двойного прыжка на экране
            ctx.font = "bold 18monospace";
            ctx.fillStyle = player.doubleJumpsLeft > 0 ? "#FFD966" : "#666";
            ctx.fillText("DOUBLE JUMP: " + player.doubleJumpsLeft, CANVAS_W - 180, 160);
        }

        function drawGameOverlay() {
            if (gameOver) {
                ctx.font = "800 48monospace";
                ctx.fillStyle = "#ff3333cc";
                ctx.fillText("GAME OVER", CANVAS_W/2 - 150, CANVAS_H/2 - 60);
                ctx.font = "24monospace";
                ctx.fillStyle = "#ffdd88";
                ctx.fillText("click RESTART", CANVAS_W/2 - 90, CANVAS_H/2 + 30);
            }
            if (deathFlash > 0) {
                ctx.fillStyle = `rgba(255, 80, 80, ${deathFlash * 0.6})`;
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                deathFlash -= 0.03;
            }
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake -= 0.8;
            }
        }

        function render() {
            drawParallaxBackground();
            drawGroundDetail();
            drawCoins();
            drawObstaclesDetailed();
            drawPlayerWithTrail();
            drawParticles();
            drawUIEffects();
            drawGameOverlay();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }

        // ---------- УПРАВЛЕНИЕ С ДВОЙНЫМ ПРЫЖКОМ ----------
        function jump() {
            if (gameOver) return;
            if (player.grounded) {
                // обычный прыжок с земли
                player.vy = JUMP_POWER;
                player.grounded = false;
                player.doubleJumpsLeft = 1;   // после прыжка с земли сбрасываем, но фактически он остаётся 1
                updateDoubleUI();
                addParticles(player.x, player.y + PLAYER_H-5, "#FFAA66", 12);
                playJumpSound();
            } 
            else if (player.doubleJumpsLeft > 0) {
                // второй прыжок в воздухе
                player.vy = JUMP_POWER;
                player.doubleJumpsLeft--;
                updateDoubleUI();
                addParticles(player.x, player.y + PLAYER_H-5, "#FFD700", 16);
                playDoubleJumpSound();
                // небольшой визуальный всплеск
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: player.x + PLAYER_W/2,
                        y: player.y + PLAYER_H/2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: -Math.random() * 5,
                        life: 0.6,
                        color: "#FFAA33",
                        size: 4
                    });
                }
            }
        }

        function handleJump(e) {
            if (e.type === 'keydown') {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    jump();
                }
            } else {
                e.preventDefault();
                jump();
            }
        }

        window.addEventListener('keydown', handleJump);
        canvas.addEventListener('click', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        document.getElementById('restartButton').addEventListener('click', () => restartGame());

        // Цикл игры
        function gameLoop() {
            if (!gameOver) updateGame();
            render();
            frame++;
            requestAnimationFrame(gameLoop);
        }

        restartGame();
        gameLoop();
        document.body.addEventListener('touchstart', () => { if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
        document.body.addEventListener('click', () => { if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
    })();
</script>
</body>
</html>
